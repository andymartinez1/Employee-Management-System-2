spring:
  application:
    name: ProjectName
  datasource:
    url: jdbc:mariadb://localhost:3306/EMS_DB
    username: "root"
    password: "password"
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MariaDBDialect
    properties:
      hibernate:
        format_sql: true